<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Sean Mihelich — Data Jockey</title>
    <meta
      name="description"
      content="Sean Mihelich, Co-Founder of Data Jockey. Save my contact."
    />
    <meta name="theme-color" content="#171009" />
    <meta property="og:title" content="Sean Mihelich — Data Jockey" />
    <meta
      property="og:description"
      content="Co-Founder, Data Jockey. AI automation for real businesses."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%23171009'/%3E%3Ccircle cx='21' cy='24' r='12.5' fill='none' stroke='%23d4a853' stroke-width='2.6'/%3E%3Cpath d='M27 15.5 L40 24 L27 32.5 Z' fill='%23c4652a'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #171009;
        --gold: #d4a853;
        --orange: #c4652a;
        --orange-hover: #a9531f;
        --cream: #f8f6f2;
        --cream-dim: #cfc8bc;
        --muted: #9a8f80;
        --hairline: rgba(212, 168, 83, 0.22);
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family:
          "Sora",
          -apple-system,
          "Segoe UI",
          sans-serif;
        background: var(--ink);
        color: var(--cream);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px 20px calc(28px + env(safe-area-inset-bottom));
        background-image: radial-gradient(
          ellipse 120% 60% at 50% -10%,
          rgba(212, 168, 83, 0.12),
          transparent 60%
        );
      }
      .card {
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .mark {
        margin-bottom: 22px;
      }
      .kicker {
        text-transform: uppercase;
        letter-spacing: 0.22em;
        font-size: 12px;
        font-weight: 700;
        color: var(--gold);
        margin-bottom: 10px;
      }
      h1 {
        font-size: 34px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.08;
      }
      .role {
        margin-top: 8px;
        font-size: 15px;
        color: var(--cream-dim);
        letter-spacing: 0.02em;
      }
      .rule {
        height: 1px;
        background: var(--hairline);
        margin: 26px 0;
      }
      .rows {
        display: flex;
        flex-direction: column;
        gap: 2px;
        text-align: left;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 14px 10px;
        color: var(--cream);
        text-decoration: none;
        border-radius: 10px;
      }
      .row:active {
        background: rgba(212, 168, 83, 0.08);
      }
      .row svg {
        flex: none;
        stroke: var(--gold);
      }
      .row .lbl {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--muted);
        font-weight: 600;
      }
      .row .val {
        font-size: 15.5px;
        margin-top: 2px;
      }
      .btns {
        margin-top: 26px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: 0;
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
      }
      .btn-primary {
        background: var(--orange);
        color: #fff;
      }
      .btn-primary:active {
        background: var(--orange-hover);
      }
      .btn-ghost {
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--hairline);
      }
      .btn-ghost:active {
        background: rgba(212, 168, 83, 0.08);
      }
      .qr-panel {
        display: none;
        margin-top: 22px;
        background: var(--cream);
        border-radius: 14px;
        padding: 22px 22px 16px;
      }
      .qr-panel.open {
        display: block;
      }
      .qr-panel img {
        width: 100%;
        max-width: 220px;
        display: block;
        margin: 0 auto;
      }
      .qr-panel p {
        margin-top: 12px;
        font-size: 12px;
        color: #6b6156;
        letter-spacing: 0.04em;
      }
      footer {
        margin-top: 30px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.08em;
      }
      footer a {
        color: var(--muted);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark">
        <svg width="64" height="64" viewBox="0 0 48 48" aria-hidden="true">
          <rect
            width="48"
            height="48"
            rx="12"
            fill="#171009"
            stroke="rgba(212,168,83,.35)"
            stroke-width="1"
          />
          <circle
            cx="21"
            cy="24"
            r="12.5"
            fill="none"
            stroke="#d4a853"
            stroke-width="2.6"
          />
          <circle
            cx="21"
            cy="24"
            r="7"
            fill="none"
            stroke="#d4a853"
            stroke-width="1.1"
            opacity=".55"
          />
          <circle cx="21" cy="24" r="2.2" fill="#d4a853" />
          <path d="M27 15.5 L40 24 L27 32.5 Z" fill="#c4652a" />
          <path
            d="M27 15.5 L40 24 L27 32.5 Z"
            fill="none"
            stroke="#171009"
            stroke-width="2"
            stroke-linejoin="round"
          />
        </svg>
      </div>

      <div class="kicker">Data Jockey</div>
      <h1>Sean Mihelich</h1>
      <div class="role">Co-Founder</div>

      <div class="rule"></div>

      <div class="rows">
        <a class="row" href="mailto:sean@datajockey.us">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="3" y="5" width="18" height="14" rx="2.5" />
            <path d="m4 7 8 6 8-6" />
          </svg>
          <span
            ><span class="lbl">Email</span><br /><span class="val"
              >sean@datajockey.us</span
            ></span
          >
        </a>
        <a
          class="row"
          href="https://datajockey.us"
          target="_blank"
          rel="noopener"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="9" />
            <path
              d="M3 12h18M12 3c2.8 2.6 4 5.6 4 9s-1.2 6.4-4 9c-2.8-2.6-4-5.6-4-9s1.2-6.4 4-9Z"
            />
          </svg>
          <span
            ><span class="lbl">Website</span><br /><span class="val"
              >datajockey.us</span
            ></span
          >
        </a>
      </div>

      <div class="btns">
        <a
          class="btn btn-primary"
          href="sean.vcf"
          download="Sean-Mihelich.vcf"
          >Save my contact</a
        >
        <button class="btn btn-ghost" id="qrBtn" type="button">
          Show QR code
        </button>
      </div>

      <div class="qr-panel" id="qrPanel">
        <img src="qr-sean.svg" alt="QR code linking to this card" />
        <p>SCAN TO OPEN THIS CARD</p>
      </div>

      <footer>
        <a href="https://datajockey.us">datajockey.us</a> &middot; AI automation
        for real businesses
      </footer>
    </main>
    <script>
      const btn = document.getElementById("qrBtn"),
        panel = document.getElementById("qrPanel");
      btn.addEventListener("click", () => {
        const open = panel.classList.toggle("open");
        btn.textContent = open ? "Hide QR code" : "Show QR code";
      });
    </script>
  </body>
</html>
