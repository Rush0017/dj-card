<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Scan me — Sean</title>
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="My QR" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%23171009'/%3E%3Ccircle cx='21' cy='24' r='12.5' fill='none' stroke='%23d4a853' stroke-width='2.6'/%3E%3Cpath d='M27 15.5 L40 24 L27 32.5 Z' fill='%23c4652a'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      /* White ground on purpose: highest-contrast target for a scanning camera */
      body {
        font-family:
          "Sora",
          -apple-system,
          "Segoe UI",
          sans-serif;
        background: #fff;
        color: #171009;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 28px 22px calc(24px + env(safe-area-inset-bottom));
        text-align: center;
      }
      .mark {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 18px;
      }
      .mark span {
        text-transform: uppercase;
        letter-spacing: 0.3em;
        font-size: 10.5px;
        font-weight: 700;
        color: #a9803a;
        text-indent: 0.3em;
      }
      h1 {
        font-family: "Fraunces", Georgia, serif;
        font-size: clamp(23px, 6.6vw, 30px);
        font-weight: 600;
        line-height: 1.1;
      }
      .role {
        margin-top: 6px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.19em;
        color: #8a8177;
        font-weight: 600;
      }
      .qr {
        width: min(78vw, 400px);
        margin: 26px 0 22px;
      }
      .qr img {
        width: 100%;
        display: block;
      }
      .cta {
        font-size: 15px;
        color: #5f574c;
        line-height: 1.5;
      }
      .cta b {
        color: #171009;
        font-weight: 600;
      }
      .back {
        margin-top: 26px;
        font-size: 12.5px;
        color: #a9803a;
        text-decoration: none;
        letter-spacing: 0.06em;
      }
      .tip {
        margin-top: 10px;
        font-size: 11.5px;
        color: #b4aca1;
        line-height: 1.5;
        max-width: 300px;
      }
    </style>
  </head>
  <body>
    <div class="mark">
      <svg width="17" height="17" viewBox="0 0 48 48" aria-hidden="true">
        <circle
          cx="21"
          cy="24"
          r="12.5"
          fill="none"
          stroke="#c49a45"
          stroke-width="3"
        />
        <path d="M27 15.5 L40 24 L27 32.5 Z" fill="#c4652a" />
      </svg>
      <span>Data Jockey</span>
    </div>

    <h1>Sean Mihelich</h1>
    <div class="role">Co-Founder</div>

    <div class="qr">
      <img src="qr-sean.svg" alt="QR code to Sean's contact card" />
    </div>

    <p class="cta">Point your camera here<br /><b>to save my contact</b></p>

    <a class="back" href="./">&larr; Open my full card</a>
    <p class="tip">
      Turn your screen brightness up if the camera is slow to catch it
    </p>
  </body>
</html>
